############################
#  Hyprland Configuration  #
############################

# ─── Monitors ─────────────────────────────────────────────────────────────────
# Format: monitor=name,resolution,position,scale
# Use `hyprctl monitors` to list connected monitors.
monitor=,preferred,auto,1
# Example for dual monitor:
# monitor=DP-1,2560x1440@144,0x0,1
# monitor=HDMI-A-1,1920x1080@60,2560x0,1

# ─── Autostart ────────────────────────────────────────────────────────────────
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = waybar
exec-once = dunst
exec-once = hyprpaper
exec-once = hypridle
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = /usr/lib/xdg-desktop-portal-hyprland

# ─── Environment Variables ────────────────────────────────────────────────────
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = MOZ_ENABLE_WAYLAND,1

# ─── Input ────────────────────────────────────────────────────────────────────
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
        disable_while_typing = true
        tap-to-click = true
    }
}

# ─── General ──────────────────────────────────────────────────────────────────
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2

    # Catppuccin Mocha — blue/purple gradient active, subtle inactive
    col.active_border   = rgba(89b4faee) rgba(cba6f7ee) 45deg
    col.inactive_border = rgba(45475aaa)

    layout = dwindle
    allow_tearing = false
}

# ─── Decoration ───────────────────────────────────────────────────────────────
decoration {
    rounding = 8

    active_opacity   = 1.0
    inactive_opacity = 0.95

    blur {
        enabled = true
        size    = 4
        passes  = 2
    }

    shadow {
        enabled      = true
        range        = 12
        render_power = 3
        color        = rgba(1a1a2eee)
    }
}

# ─── Animations ───────────────────────────────────────────────────────────────
animations {
    enabled = true

    bezier = smooth,     0.05, 0.9, 0.1, 1.05
    bezier = linear,     0.0,  0.0, 1.0, 1.0
    bezier = overshot,   0.13, 0.99, 0.29, 1.1

    animation = windows,     1, 5,  smooth,  slide
    animation = windowsOut,  1, 5,  smooth,  popin 80%
    animation = border,      1, 10, linear
    animation = borderangle, 1, 8,  linear,  loop
    animation = fade,        1, 5,  smooth
    animation = workspaces,  1, 5,  overshot, slidevert
}

# ─── Layouts ──────────────────────────────────────────────────────────────────
dwindle {
    preserve_split = true
}

master {
    new_status = master
}

# ─── Misc ─────────────────────────────────────────────────────────────────────
misc {
    mouse_move_enables_dpms = true
    key_press_enables_dpms  = true
    font_family             = FiraCode Nerd Font
}

# ─── Variables ────────────────────────────────────────────────────────────────
$mainMod     = SUPER
$terminal    = alacritty
$fileManager = thunar
$menu        = wofi --show drun
$browser     = firefox

# ─── Keybindings ──────────────────────────────────────────────────────────────

# Core
bind = $mainMod,       Return, exec, $terminal
bind = $mainMod,       Q,      killactive
bind = $mainMod,       E,      exec, $fileManager
bind = $mainMod,       R,      exec, $menu
bind = $mainMod,       B,      exec, $browser
bind = $mainMod,       F,      fullscreen
bind = $mainMod,       V,      togglefloating
bind = $mainMod,       J,      togglesplit

# Session
bind = $mainMod SHIFT, M,      exec, wlogout
bind = $mainMod,       L,      exec, hyprlock
bind = $mainMod SHIFT, E,      exit

# Caffeine toggle (inhibits idle/sleep)
bind = $mainMod SHIFT, C,      exec, ~/.config/hypr/scripts/caffeine-toggle.sh

# Screenshot
bind = ,         Print,         exec, grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot" "Copied to clipboard"
bind = $mainMod, Print,         exec, grim ~/Pictures/screenshots/$(date +%Y%m%d-%H%M%S).png && notify-send "Screenshot" "Saved to ~/Pictures/screenshots"
bind = $mainMod SHIFT, Print,   exec, grim -o $(hyprctl monitors -j | jq -r '.[0].name') - | wl-copy

# Focus movement — arrow keys and vim keys
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, H,     movefocus, l
bind = $mainMod, L,     movefocus, r
bind = $mainMod, K,     movefocus, u
bind = $mainMod, J,     movefocus, d

# Move active window
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# Resize with keyboard
binde = $mainMod CTRL, right, resizeactive,  30 0
binde = $mainMod CTRL, left,  resizeactive, -30 0
binde = $mainMod CTRL, up,    resizeactive,   0 -30
binde = $mainMod CTRL, down,  resizeactive,   0  30

# Workspaces — switch
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Workspaces — move window
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Workspaces — mouse scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Move/resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Audio (pipewire/wireplumber)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 10%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# ─── Window Rules ─────────────────────────────────────────────────────────────

# Float these apps
windowrule = float:1, class:pavucontrol
windowrule = float:1, class:blueman-manager
windowrule = float:1, class:nm-connection-editor
windowrule = float:1, class:^(lxappearance)$
windowrule = float:1, class:^(nwg-look)$
windowrule = float:1, class:^(system-config-printer)$
windowrule = float:1, title:^(File Operation Progress)$
windowrule = float:1, title:^(Confirm to replace files)$
windowrule = float:1, class:^(yad)$

# Center floats
windowrule = center:1, class:pavucontrol
windowrule = center:1, class:blueman-manager

# Size floats
windowrule = size:700 500, class:pavucontrol
windowrule = size:800 600, class:blueman-manager

# LibreOffice — keep tiled
windowrule = tile:1, class:^(soffice)$
