# hyprpaper configuration
# Wallpapers are managed by waypaper which writes to this file automatically.
# To set a wallpaper manually:
#   preload = /path/to/wallpaper.jpg
#   wallpaper = ,/path/to/wallpaper.jpg

# Splash disabled so no logo shows before wallpaper loads
splash = false

# Uncomment and set your wallpaper here, or use: waypaper
# preload  = ~/Pictures/wallpapers/wallpaper.jpg
# wallpaper = ,~/Pictures/wallpapers/wallpaper.jpg
